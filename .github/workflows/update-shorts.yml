name: Update YouTube Shorts

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-shorts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest Shorts from YouTube RSS
        id: fetch-shorts
        run: |
          CHANNEL_ID="UCRtEqdqI_s1B4xgARE_NPZg"
          
          # Try direct RSS first, then fallback to noembed API
          echo "Trying direct YouTube RSS..."
          HTTP_CODE=$(curl -sfL --max-time 15 -o rss.xml -w "%{http_code}" "https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}" 2>/dev/null || echo "000")
          
          if [ "$HTTP_CODE" != "200" ] || [ ! -s rss.xml ]; then
            echo "Direct RSS failed (HTTP $HTTP_CODE), trying via proxy..."
            curl -sfL --max-time 15 "https://api.codetabs.com/v1/proxy?quest=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}" -o rss.xml 2>/dev/null
            
            if [ ! -s rss.xml ]; then
              echo "Proxy also failed, trying alternative..."
              # Use a simple approach: scrape from channel page
              python3 << 'PYFETCH'
import urllib.request, re, ssl

ctx = ssl.create_default_context()
ctx.check_hostname = False
ctx.verify_mode = ssl.CERT_NONE

CHANNEL_ID = "UCRtEqdqI_s1B4xgARE_NPZG"
url = f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"

req = urllib.request.Request(url, headers={
    'User-Agent': 'Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)',
    'Accept': 'application/xml'
})

try:
    with urllib.request.urlopen(req, timeout=15, context=ctx) as resp:
        data = resp.read().decode('utf-8')
        with open('rss.xml', 'w') as f:
            f.write(data)
        print(f"Got RSS via Python urllib: {len(data)} bytes")
except Exception as e:
    print(f"All methods failed: {e}")
    exit(1)
PYFETCH
          fi
          
          if [ ! -s rss.xml ]; then
            echo "ERROR: Could not fetch RSS feed by any method"
            exit 1
          fi
          fi
          
          echo "RSS fetched successfully ($(wc -c < rss.xml) bytes)"

      - name: Parse and generate new SHORTS array
        run: |
          python3 << 'PYEOF'
          import re

          with open('rss.xml', 'r', encoding='utf-8') as f:
              text = f.read()

          entries = re.split(r'<entry>', text)[1:9]
          shorts = []
          for e in entries:
              vid_m = re.search(r'<yt:videoId>([^<]+)</yt:videoId>', e)
              title_m = re.search(r'<title>([^<]+)</title>', e)
              if vid_m and title_m:
                  vid = vid_m.group(1)
                  title = title_m.group(1)
                  title = title.replace("\\", "\\\\").replace("'", "\\'").replace("&quot;", '"').replace("&amp;", "&")
                  shorts.append(f"    {{id:'{vid}',title:'{title}'}}")

          new_block = "  const SHORTS=[\n" + ",\n".join(shorts) + ",\n  ];"
          
          with open('new_shorts.txt', 'w') as f:
              f.write(new_block)
          
          print(f"Generated {len(shorts)} shorts")
          PYEOF

      - name: Update HTML file
        run: |
          python3 << 'PYEOF'
          import re

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          with open('new_shorts.txt', 'r') as f:
              new_shorts = f.read().strip()

          pattern = r'const SHORTS=\[[\s\S]*?\];'
          match = re.search(pattern, html)
          
          if not match:
              print("ERROR: SHORTS block not found!")
              exit(1)

          old_block = match.group(0)
          new_html = html.replace(old_block, new_shorts, 1)

          if new_html == html:
              print("ERROR: Replacement failed!")
              exit(1)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(new_html)

          print(f"Updated! Old: {len(old_block)} chars -> New: {len(new_shorts)} chars")
          PYEOF

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected!"
            git diff index.html | head -30
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "auto: update YouTube shorts $(date '+%Y-%m-%d %H:%M')"
          git push
          echo "Pushed to GitHub!"

      - name: Cleanup
        if: always()
        run: rm -f rss.xml new_shorts.txt
